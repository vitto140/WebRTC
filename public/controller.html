<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu&family=Sniglet:wght@400;800&display=swap" rel="stylesheet">

    <link rel="shortcut icon" href="assets/logo-ly.png" type="image/x-icon">
    <title>LoveYours</title>
</head>

<body class="controller-body">

    <div class="controller-container">

        <!-- Flower Picker Section -->
        <div class="flower-section">
            <h2 class="controller-title">PICK THE FLOWERS</h2>

            <div class="carousel">
                <button class="carousel-btn prev" onclick="changeFlower(-1)">
                    <span>&lt;</span>
                </button>

                <div class="flower-display">
                    <img id="currentFlower" src="assets/flower1.png" alt="Flower" class="flower-img">
                </div>

                <button class="carousel-btn next" onclick="changeFlower(1)">
                    <span>&gt;</span>
                </button>
            </div>

            <button class="add-flower-btn" onclick="addCurrentFlower()">ADD FLOWER</button>
        </div>

    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let peerConnection;
        let dataChannel;
        let targetSocketId;

        const servers = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };
        // Flower carousel
        const flowers = [
            { name: 'tulip', img: 'assets/flower1.png' },
            { name: 'rose', img: 'assets/flower2.png' },
            { name: 'sunflower',img: 'assets/flower3.png' }
        ];
        let currentFlowerIndex = 0;

        const changeFlower = (direction) => {
            currentFlowerIndex = (currentFlowerIndex + direction + flowers.length) % flowers.length;
            document.getElementById('currentFlower').src = flowers[currentFlowerIndex].img;
        };

        const addCurrentFlower = () => {
            const flower = flowers[currentFlowerIndex];
            sendFlower(flower.img);
        };


        const getUrlParameter = name => {
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(location.search);
            return results === null ? false : decodeURIComponent(results[1]);
        };

        const init = async () => {
            targetSocketId = getUrlParameter('id');
            if (!targetSocketId) {
                alert('Missing id');
                return;
            }

            socket = io.connect('/');

            socket.on('connect', async () => {
                console.log('Connected:', socket.id);
                await createPeer(true);
            });

            socket.on('signal', async (fromId, signal) => {
                console.log('Received signal from', fromId);

                if (signal.type === 'answer') {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
                } else if (signal.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(signal));
                }
            });
        };

        const createPeer = async (initiator) => {
            peerConnection = new RTCPeerConnection(servers);

            peerConnection.onicecandidate = e => {
                if (e.candidate) {
                    socket.emit('signal', targetSocketId, e.candidate);
                }
            };

            dataChannel = peerConnection.createDataChannel('flowers');
            setupDataChannel();

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('signal', targetSocketId, offer);
        };

        const setupDataChannel = () => {
            dataChannel.onopen = () => {
                console.log('DataChannel open');
            };
        };

        const sendFlower = flower => {
            if (dataChannel && dataChannel.readyState === "open") {
                console.log("📤 Sending flower:", flower);
                dataChannel.send(flower);
            } else {
                console.log("❌ DataChannel not open yet");
            }
        };

        init();
    </script>
</body>

</html>
