<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>LoveYOURS CONTROLLER</title>
</head>
<body class="controller-body">
    <div class="controller-container">
        <!-- Flower Picker Section -->
        <div class="flower-section">
            <h2 class="controller-title">PICK THE FLOWERS</h2>
            <div class="carousel">
                <button class="carousel-btn prev" onclick="changeFlower(-1)">
                    <span>&lt;</span>
                </button>
                <div class="flower-display">
                    <img id="currentFlower" src="assets/flower1.png" alt="Flower" class="flower-img">
                </div>
                <button class="carousel-btn next" onclick="changeFlower(1)">
                    <span>&gt;</span>
                </button>
            </div>
            <div class="message-section">
                <h2 class="controller-title">LEAVE A MESSAGE</h2>
                <button class="add-flower-btn" onclick="addCurrentFlower()">ADD FLOWER</button>
                <div class="voice-controls">
                    <button class="voice-btn add-flower-btn" id="startBtn">START</button>
                    <button class="voice-btn add-flower-btn" id="stopBtn">STOP</button>
                    <button class="voice-btn add-flower-btn" onclick="playVoice()">PLAY</button>
                </div>
            </div>
            <div id="emailForm" style="display: none; margin-top: 20px;">
                <input type="email" id="recipientEmail" placeholder="Recipient's email"
                    style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 2px solid #ff6b9d;">
                <textarea id="messageText" placeholder="Add a personal message (optional)"
                    style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 2px solid #ff6b9d; min-height: 80px;"></textarea>
                <button class="add-flower-btn" onclick="sendEmail()">SEND</button>
            </div>
            <button class="add-flower-btn" id="doneBtn" onclick="showEmailForm()">DONE!</button>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket;
        let peerConnection;
        let dataChannel;
        let targetSocketId;
        let selectedFlowers = [];  
        let storedVoiceData = null;

        const servers = {
            iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        };
        // Flower carousel
        const flowers = [
            { name: 'tulip', img: 'assets/flower1.png' },
            { name: 'rose', img: 'assets/flower2.png' },
            { name: 'sunflower', img: 'assets/flower3.png' }
        ];
        let currentFlowerIndex = 0;

        const changeFlower = (direction) => {
            currentFlowerIndex = (currentFlowerIndex + direction + flowers.length) % flowers.length;
            document.getElementById('currentFlower').src = flowers[currentFlowerIndex].img;
        };

        const addCurrentFlower = () => {
            const flower = flowers[currentFlowerIndex];
            selectedFlowers.push(flower.img);
            sendFlower(flower.img);
        };


        const getUrlParameter = name => {
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(location.search);
            return results === null ? false : decodeURIComponent(results[1]);
        };
        // Voice recording variables
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        const startRecording = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => {
                    audioChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        const base64Audio = reader.result.split(',')[1];
                        sendVoiceMessage(base64Audio);
                    };
                    reader.readAsDataURL(audioBlob);

                    // Stop all tracks
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                console.log('🎤 Recording started');

                document.getElementById('startBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;

            } catch (error) {
                console.error('❌ Microphone error:', error);
                alert('Could not access microphone');
            }
        };

        const stopRecording = () => {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                console.log('🛑 Recording stopped');

                document.getElementById('startBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
            }
        };
        const playVoice = () => {
            if (dataChannel && dataChannel.readyState === "open") {
                const message = JSON.stringify({
                    type: "play"
                });
                dataChannel.send(message);
                console.log("▶️ Play command sent");
            }
        };

        const sendVoiceMessage = voiceData => {
            storedVoiceData = voiceData;

            if (dataChannel && dataChannel.readyState === "open") {
                console.log("📤 Sending voice message");
                const message = JSON.stringify({
                    type: 'voice',
                    data: voiceData
                });
                dataChannel.send(message);
            } else {
                console.log("❌ DataChannel not open");
                alert('Not connected yet!');
            }
        };

        const init = async () => {
            targetSocketId = getUrlParameter('id');
            if (!targetSocketId) {
                alert('Missing id');
                return;
            }

            socket = io.connect('/');

            socket.on('connect', async () => {
                console.log('Connected:', socket.id);
                await createPeer(true);
            });

            socket.on('signal', async (fromId, signal) => {
                console.log('Received signal from', fromId);

                if (signal.type === 'answer') {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(signal));
                } else if (signal.candidate) {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(signal));
                }
            });

            // voice button listeners
            document.getElementById('startBtn').addEventListener('click', startRecording);
            document.getElementById('stopBtn').addEventListener('click', stopRecording);
            document.getElementById('stopBtn').disabled = true;
        };

        const createPeer = async (initiator) => {
            peerConnection = new RTCPeerConnection(servers);

            peerConnection.onicecandidate = e => {
                if (e.candidate) {
                    socket.emit('signal', targetSocketId, e.candidate);
                }
            };

            if (initiator) {
                dataChannel = peerConnection.createDataChannel('flowers');
                setupDataChannel();
            }

            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit('signal', targetSocketId, offer);
        };

        const setupDataChannel = () => {
            dataChannel.onopen = () => {
                console.log('DataChannel open');
            };
        };

        const sendFlower = flower => {
            if (dataChannel && dataChannel.readyState === "open") {
                console.log("📤 Sending flower:", flower);
                dataChannel.send(flower);
            } else {
                console.log("❌ DataChannel not open yet");
            }
        };

        const showEmailForm = () => {
            document.getElementById('emailForm').style.display = 'block';
            document.getElementById('doneBtn').style.display = 'none';
        };

        const sendEmail = async () => {
            const email = document.getElementById('recipientEmail').value;
            const message = document.getElementById('messageText').value;

            if (!email) {
                alert('Please enter an email address');
                return;
            }

            try {
                const response = await fetch('/send-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        recipient: email,
                        message: message,
                        flowers: selectedFlowers,
                        voiceNote: storedVoiceData
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // Notify desktop to show "sent" page
                    if (dataChannel && dataChannel.readyState === "open") {
                        dataChannel.send(JSON.stringify({ type: 'email-sent' }));
                    }

                    // Show success message on phone
                    document.body.innerHTML = `
                        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Sniglet', system-ui; color: #ff6b9d;">
                            <h1 style="font-size: 3rem;">✉️ Sent!</h1>
                            <p style="font-size: 1.5rem;">Your bouquet has been delivered</p>
                        </div>
                    `;
                } else {
                    alert('Failed to send email. Please try again.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to send email. Please try again.');
            }
        };

        init();
    </script>
</body>

</html>
